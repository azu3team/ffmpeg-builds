name: Build FFmpeg LGPL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: macOS arm64 (source build)
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install nasm yasm python-setuptools meson ninja

      - name: Build FFmpeg
        run: |
          while sleep 300; do echo "=====[ $SECONDS seconds still running ]====="; done &
          ./build-ffmpeg-macos
          kill %1

      - name: Verify binary
        run: |
          ./workspace/bin/ffmpeg -version
          ./workspace/bin/ffmpeg -buildconf
          ./workspace/bin/ffprobe -version
          otool -L ./workspace/bin/ffmpeg
          # Verify no GPL flags
          if ./workspace/bin/ffmpeg -buildconf 2>&1 | grep -q 'enable-gpl'; then
            echo "ERROR: GPL flag detected in LGPL build!"
            exit 1
          fi

      - name: Package
        run: |
          mkdir -p dist
          cp workspace/bin/ffmpeg dist/
          cp workspace/bin/ffprobe dist/
          cd dist && tar czf ../ffmpeg-lgpl-darwin-arm64.tar.gz ffmpeg ffprobe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-lgpl-darwin-arm64
          path: ffmpeg-lgpl-darwin-arm64.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ffmpeg-lgpl-darwin-arm64.tar.gz

  repackage-windows-x64:
    name: Windows x64 (repackage BtbN LGPL)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download BtbN LGPL shared build
        run: |
          curl -L -o btbn.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          unzip btbn.zip

      - name: Repackage
        run: |
          mkdir -p dist
          # Copy only needed files: ffmpeg.exe, ffprobe.exe, and DLLs
          cp ffmpeg-master-latest-win64-lgpl-shared/bin/ffmpeg.exe dist/
          cp ffmpeg-master-latest-win64-lgpl-shared/bin/ffprobe.exe dist/
          cp ffmpeg-master-latest-win64-lgpl-shared/bin/*.dll dist/
          cd dist && zip -r ../ffmpeg-lgpl-win32-x64.zip .

      - name: Verify contents
        run: |
          unzip -l ffmpeg-lgpl-win32-x64.zip
          echo "---"
          du -sh ffmpeg-lgpl-win32-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-lgpl-win32-x64
          path: ffmpeg-lgpl-win32-x64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ffmpeg-lgpl-win32-x64.zip
